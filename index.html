<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mandarin Fun Days! 🐼</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #FF85A1;
            --blue: #4CC9F0;
            --yellow: #FFD166;
            --green: #06D6A0;
            --purple: #B79CED;
            --dark: #2B2D42;
            --white: #FFFFFF;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #f0f7ff;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: var(--dark);
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Navigasi Utama */
        .top-nav {
            width: 100%;
            background: white;
            padding: 10px 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .btn-group {
            background: #f0f0f0;
            padding: 4px;
            border-radius: 50px;
            display: flex;
            gap: 4px;
        }

        .nav-btn {
            border: none;
            padding: 10px 18px;
            border-radius: 40px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 700;
            transition: 0.3s;
            background: transparent;
            color: #666;
            font-size: 0.9rem;
        }

        .nav-btn.active {
            background: var(--blue);
            color: white;
            box-shadow: 0 4px 8px rgba(76, 201, 240, 0.3);
        }

        header {
            text-align: center;
            padding: 20px;
        }

        h1 {
            font-family: 'Fredoka One', cursive;
            color: var(--pink);
            font-size: 2.2rem;
            margin: 0;
            text-shadow: 2px 2px 0px white;
        }

        /* Mod Belajar */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            width: 90%;
            max-width: 900px;
            padding: 10px;
        }

        .card {
            background: white;
            border-radius: 25px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            border: 5px solid;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 6px 0 rgba(0,0,0,0.05);
        }

        .card:hover { transform: translateY(-5px); }

        .pinyin { font-size: 1rem; color: #555; font-weight: 700; background: #f0f0f0; padding: 2px 10px; border-radius: 10px; }
        .chinese { font-size: 2.5rem; display: block; margin: 10px 0; }
        .meaning { font-weight: 700; color: #888; border-top: 2px dashed #eee; padding-top: 10px; display: block; }

        /* Mod Kuiz */
        #game-section {
            display: none;
            width: 90%;
            max-width: 500px;
            background: white;
            padding: 30px;
            border-radius: 35px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            margin-top: 10px;
            border: 6px solid var(--purple);
        }

        .stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .lives { font-size: 1.4rem; background: #fff5f5; padding: 5px 15px; border-radius: 20px; }
        .score { font-weight: 700; color: var(--purple); }

        .quiz-type-label { color: #999; font-weight: 700; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 1px; }

        .target-display {
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 30px;
        }

        .target-text { font-size: 4rem; font-weight: bold; color: var(--blue); }
        .target-pinyin { font-size: 2.5rem; color: var(--green); font-weight: bold; }
        
        .audio-btn {
            background: var(--pink);
            color: white;
            border: none;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 6px 0 #d65a77;
        }

        .audio-btn:active { transform: translateY(4px); box-shadow: none; }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .opt-btn {
            padding: 18px;
            border-radius: 20px;
            border: 3px solid #eee;
            background: #fdfdfd;
            font-family: inherit;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .opt-btn:hover { border-color: var(--blue); background: #f0f7ff; }
        .opt-btn.correct { background: var(--green) !important; color: white !important; border-color: #05b386 !important; }
        .opt-btn.wrong { background: var(--pink) !important; color: white !important; border-color: #e66b88 !important; }

        /* Overlay */
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(4px);
        }

        .modal {
            background: white;
            padding: 40px;
            border-radius: 30px;
            text-align: center;
            width: 85%;
            max-width: 350px;
            animation: bounceIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes bounceIn {
            from { transform: scale(0); }
            to { transform: scale(1); }
        }

        .btn-big {
            background: var(--blue);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 20px;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div class="top-nav">
        <div class="btn-group">
            <button class="nav-btn active" id="mode-learn-btn" onclick="switchMode('learn')">📖 <span id="t-learn">Belajar</span></button>
            <button class="nav-btn" id="mode-quiz-btn" onclick="switchMode('quiz')">🎮 <span id="t-quiz">Kuiz</span></button>
        </div>
        <div class="btn-group">
            <button class="nav-btn active" id="lang-bm-btn" onclick="setLang('bm')">🇲🇾 BM</button>
            <button class="nav-btn" id="lang-en-btn" onclick="setLang('en')">🇬🇧 EN</button>
        </div>
    </div>

    <header>
        <h1 id="title">Belajar Hari 🏮</h1>
        <p id="sub">Tekan kad untuk dengar sebutan!</p>
    </header>

    <!-- Belajar -->
    <div id="learn-section" class="grid-container"></div>

    <!-- Kuiz -->
    <div id="quiz-section">
        <div class="stats">
            <div class="lives" id="lives-display">❤️ ❤️ ❤️</div>
            <div class="score"><span id="t-score">Markah</span>: <span id="score-val">0</span></div>
        </div>
        
        <div id="quiz-type-msg" class="quiz-type-label">TEKA MAKSUD</div>

        <div class="target-display">
            <div id="target-hanzi" class="target-text">星期一</div>
            <div id="target-pinyin" class="target-pinyin hidden">Xīng qī yī</div>
            <button id="target-audio" class="audio-btn hidden" onclick="replayAudio()">🔊</button>
        </div>

        <div class="options-grid" id="quiz-options"></div>
    </div>

    <!-- Result Modal -->
    <div class="overlay" id="result-overlay">
        <div class="modal">
            <h2 id="result-emoji" style="font-size: 4rem; margin: 0;">🎉</h2>
            <h2 id="result-title">Hebat!</h2>
            <p id="result-desc">Anda sangat pandai!</p>
            <button class="btn-big" onclick="startQuiz()" id="t-again">Main Lagi</button>
        </div>
    </div>

    <script>
        const days = [
            { bm: 'Isnin', en: 'Monday', zh: '星期一', py: 'Xīng qī yī' },
            { bm: 'Selasa', en: 'Tuesday', zh: '星期二', py: 'Xīng qī èr' },
            { bm: 'Rabu', en: 'Wednesday', zh: '星期三', py: 'Xīng qī sān' },
            { bm: 'Khamis', en: 'Thursday', zh: '星期四', py: 'Xīng qī sì' },
            { bm: 'Jumaat', en: 'Friday', zh: '星期五', py: 'Xīng qī wǔ' },
            { bm: 'Sabtu', en: 'Saturday', zh: '星期六', py: 'Xīng qī liù' },
            { bm: 'Ahad', en: 'Sunday', zh: '星期日', py: 'Xīng qī rì' }
        ];

        let lang = 'bm';
        let lives = 3;
        let score = 0;
        let currentTarget = null;
        let quizType = 'hanzi'; // hanzi, pinyin, audio

        const i18n = {
            bm: {
                title: "Belajar Hari 🏮",
                sub: "Tekan kad untuk dengar sebutan!",
                learn: "Belajar",
                quiz: "Kuiz",
                score: "Markah",
                again: "Cuba Lagi",
                win: "Tahniah!",
                lose: "Alamak!",
                descWin: "Markah anda sangat tinggi!",
                descLose: "Jangan putus asa, cuba lagi!",
                typeHanzi: "TEKA MAKSUD (HANZI)",
                typePinyin: "TEKA MAKSUD (PINYIN)",
                typeAudio: "TEKA MAKSUD (DENGAR)"
            },
            en: {
                title: "Learn Days 🏮",
                sub: "Tap a card to hear the sound!",
                learn: "Learn",
                quiz: "Quiz",
                score: "Score",
                again: "Play Again",
                win: "Great Job!",
                lose: "Game Over!",
                descWin: "Your score is amazing!",
                descLose: "Don't give up, try again!",
                typeHanzi: "GUESS MEANING (HANZI)",
                typePinyin: "GUESS MEANING (PINYIN)",
                typeAudio: "GUESS MEANING (LISTEN)"
            }
        };

        function setLang(l) {
            lang = l;
            document.querySelectorAll('#lang-bm-btn, #lang-en-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`lang-${l}-btn`).classList.add('active');
            updateUI();
            renderLearn();
            if(document.getElementById('quiz-section').style.display === 'block') nextQuestion();
        }

        function updateUI() {
            const t = i18n[lang];
            document.getElementById('title').innerText = t.title;
            document.getElementById('sub').innerText = t.sub;
            document.getElementById('t-learn').innerText = t.learn;
            document.getElementById('t-quiz').innerText = t.quiz;
            document.getElementById('t-score').innerText = t.score;
            document.getElementById('t-again').innerText = t.again;
        }

        function renderLearn() {
            const container = document.getElementById('learn-section');
            container.innerHTML = "";
            const colors = ['#FFADAD','#FFD6A5','#FDFFB6','#CAFFBF','#9BF6FF','#A0C4FF','#BDB2FF'];
            days.forEach((d, i) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.style.borderColor = colors[i];
                card.onclick = () => speak(d.zh);
                card.innerHTML = `
                    <span class="pinyin">${d.py}</span>
                    <span class="chinese">${d.zh}</span>
                    <span class="meaning">${d[lang].toUpperCase()}</span>
                `;
                container.appendChild(card);
            });
        }

        function switchMode(m) {
            document.querySelectorAll('#mode-learn-btn, #mode-quiz-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(`mode-${m}-btn`).classList.add('active');
            
            if(m === 'learn') {
                document.getElementById('learn-section').style.display = 'grid';
                document.getElementById('quiz-section').style.display = 'none';
            } else {
                document.getElementById('learn-section').style.display = 'none';
                document.getElementById('quiz-section').style.display = 'block';
                startQuiz();
            }
        }

        function speak(txt) {
            window.speechSynthesis.cancel();
            const m = new SpeechSynthesisUtterance(txt);
            m.lang = 'zh-CN';
            m.rate = 0.8;
            window.speechSynthesis.speak(m);
        }

        function startQuiz() {
            lives = 3;
            score = 0;
            document.getElementById('score-val').innerText = score;
            document.getElementById('result-overlay').style.display = 'none';
            updateLivesUI();
            nextQuestion();
        }

        function nextQuestion() {
            const types = ['hanzi', 'pinyin', 'audio'];
            quizType = types[Math.floor(Math.random() * types.length)];
            currentTarget = days[Math.floor(Math.random() * days.length)];
            
            // UI Reset
            document.getElementById('target-hanzi').classList.add('hidden');
            document.getElementById('target-pinyin').classList.add('hidden');
            document.getElementById('target-audio').classList.add('hidden');
            
            const label = document.getElementById('quiz-type-msg');

            if(quizType === 'hanzi') {
                document.getElementById('target-hanzi').innerText = currentTarget.zh;
                document.getElementById('target-hanzi').classList.remove('hidden');
                label.innerText = i18n[lang].typeHanzi;
            } else if(quizType === 'pinyin') {
                document.getElementById('target-pinyin').innerText = currentTarget.py;
                document.getElementById('target-pinyin').classList.remove('hidden');
                label.innerText = i18n[lang].typePinyin;
            } else {
                document.getElementById('target-audio').classList.remove('hidden');
                label.innerText = i18n[lang].typeAudio;
                speak(currentTarget.zh);
            }

            // Options
            let opts = [currentTarget];
            while(opts.length < 3) {
                let r = days[Math.floor(Math.random() * days.length)];
                if(!opts.includes(r)) opts.push(r);
            }
            opts.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('quiz-options');
            grid.innerHTML = "";
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'opt-btn';
                b.innerText = o[lang];
                b.onclick = () => checkAnswer(o, b);
                grid.appendChild(b);
            });
        }

        function replayAudio() {
            if(currentTarget) speak(currentTarget.zh);
        }

        function checkAnswer(sel, btn) {
            const all = document.querySelectorAll('.opt-btn');
            all.forEach(b => b.style.pointerEvents = 'none');

            if(sel === currentTarget) {
                btn.classList.add('correct');
                score += 10;
                document.getElementById('score-val').innerText = score;
                speak(currentTarget.zh);
                setTimeout(nextQuestion, 1200);
            } else {
                btn.classList.add('wrong');
                lives--;
                updateLivesUI();
                if(lives <= 0) {
                    setTimeout(() => finishQuiz(false), 500);
                } else {
                    setTimeout(() => {
                        all.forEach(b => {
                            b.style.pointerEvents = 'auto';
                            b.classList.remove('wrong');
                        });
                    }, 800);
                }
            }
        }

        function updateLivesUI() {
            document.getElementById('lives-display').innerText = "❤️ ".repeat(lives) || "💔";
        }

        function finishQuiz(win) {
            const overlay = document.getElementById('result-overlay');
            overlay.style.display = 'flex';
            document.getElementById('result-emoji').innerText = score > 30 ? "🏆" : "😅";
            document.getElementById('result-title').innerText = score > 30 ? i18n[lang].win : i18n[lang].lose;
            document.getElementById('result-desc').innerText = score > 30 ? i18n[lang].descWin : i18n[lang].descLose;
        }

        // Init
        setLang('bm');
    </script>
</body>
</html>
